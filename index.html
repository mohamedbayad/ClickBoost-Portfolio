<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Portfolio - Digital Marketer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #080808;
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    ::selection {
      background: rgba(225, 29, 72, 0.35);
    }

    /* Backlight glow animations */
    @keyframes glow-breathe {

      0%,
      100% {
        opacity: 0.7;
        transform: translateX(-50%) scale(1)
      }

      50% {
        opacity: 1;
        transform: translateX(-50%) scale(1.06)
      }
    }

    @keyframes glow-breathe2 {

      0%,
      100% {
        opacity: 0.4;
        transform: translateX(-50%) scale(1)
      }

      50% {
        opacity: 0.65;
        transform: translateX(-50%) scale(1.1)
      }
    }

    @keyframes lines-drift {
      0% {
        transform: translateY(0)
      }

      100% {
        transform: translateY(-40px)
      }
    }

    @keyframes rim-pulse {

      0%,
      100% {
        opacity: 0.55
      }

      50% {
        opacity: 0.8
      }
    }

    @keyframes lp-callout-float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(4px);
      }
    }

    @keyframes lp-callout-glow {

      0%,
      100% {
        box-shadow: 0 12px 26px rgba(0, 0, 0, 0.36), 0 0 0 rgba(var(--lp-brand-rgb), 0);
      }

      50% {
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.42), 0 0 18px rgba(var(--lp-brand-rgb), 0.38);
      }
    }

    @keyframes lp-arrow-nudge {

      0%,
      100% {
        transform: translate(0, 0);
      }

      50% {
        transform: translate(-4px, 3px);
      }
    }

    @keyframes lp-arrow-glow {

      0%,
      100% {
        filter: drop-shadow(0 0 6px rgba(var(--lp-brand-rgb), 0.3));
      }

      50% {
        filter: drop-shadow(0 0 14px rgba(var(--lp-brand-rgb), 0.62));
      }
    }

    @keyframes brands-marquee {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    .brands-marquee-track {
      animation: brands-marquee 26s linear infinite;
    }

    .brands-marquee-track:hover {
      animation-play-state: paused;
    }

    .lp-scroll-callout {
      position: absolute;
      right: 12px;
      bottom: 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(var(--lp-brand-rgb), 0.45);
      background: linear-gradient(135deg, rgba(3, 15, 28, 0.88), rgba(var(--lp-brand-rgb), 0.24));
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.36);
      pointer-events: none;
      z-index: 10;
      animation: lp-callout-float 1.8s ease-in-out infinite, lp-callout-glow 2s ease-in-out infinite;
    }

    .lp-scroll-callout-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 11px;
      line-height: 1;
      background: linear-gradient(135deg, var(--lp-brand), #ffffff);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.08), 0 0 12px rgba(var(--lp-brand-rgb), 0.45);
      flex: 0 0 auto;
    }

    .lp-scroll-callout-label {
      color: rgba(240, 249, 255, 0.98);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .lp-scroll-callout-arrow {
      position: absolute;
      right: -38px;
      bottom: 32px;
      width: 72px;
      height: 72px;
      color: var(--lp-brand);
      filter: drop-shadow(0 0 6px rgba(var(--lp-brand-rgb), 0.3));
      pointer-events: none;
      z-index: 9;
      animation: lp-arrow-nudge 1.3s ease-in-out infinite, lp-arrow-glow 1.6s ease-in-out infinite;
    }

    @media (max-width: 820px) {
      .lp-scroll-callout {
        right: 8px;
        bottom: 8px;
        padding: 5px 9px;
        gap: 7px;
      }

      .lp-scroll-callout-label {
        font-size: 9px;
        letter-spacing: 0.07em;
      }

      .lp-scroll-callout-dot {
        width: 14px;
        height: 14px;
        font-size: 10px;
      }

      .lp-scroll-callout-arrow {
        right: -26px;
        bottom: 30px;
        width: 56px;
        height: 56px;
      }
    }

    /* Tweaks panel */
    #tweaks-panel {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      background: rgba(11, 17, 32, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 20px 24px;
      width: 240px;
      backdrop-filter: blur(20px);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
      display: none;
    }

    #tweaks-panel h4 {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
    }

    #tweaks-panel label {
      display: block;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
      margin-top: 12px;
    }

    #tweaks-panel input[type=color] {
      width: 100%;
      height: 32px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: none;
    }

    #tweaks-panel select {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 8px;
      outline: none;
    }

    #tweaks-panel input[type=text] {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 8px;
      outline: none;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <div id="tweaks-panel">
    <h4>Tweaks</h4>
    <label>Accent Color</label>
    <input type="color" id="tw-color" value="#E11D48" />
    <label>Hero Headline</label>
    <input type="text" id="tw-headline" value="YOUR NAME" placeholder="Your name or tagline" />
    <label>Section Style</label>
    <select id="tw-style">
      <option value="dark">All Dark</option>
      <option value="mixed" selected>Dark + Light Alternating</option>
    </select>
  </div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* â”€â”€ Design tokens â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    const T = {
      dark: '#080808',
      dark2: '#0B1120',
      dark3: '#111827',
      card: '#111520',
      brand: '#E11D48',
      accent: '#a3e635',
      success: '#22c55e',
      light: '#fafafa',
      white: '#ffffff',
      muted: '#71717a',
      border: 'rgba(255,255,255,0.08)',
      borderL: '#e4e4e7',
    };

    /* â”€â”€ Tweaks â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#E11D48",
      "heroHeadline": "CLICKBOOST",
      "sectionStyle": "mixed"
    }/*EDITMODE-END*/;

    function useTweaks() {
      const [tw, setTw] = useState(TWEAK_DEFAULTS);
      useEffect(() => {
        const saved = localStorage.getItem('portfolio-tweaks');
        if (saved) try { setTw({ ...TWEAK_DEFAULTS, ...JSON.parse(saved) }); } catch (e) { }
        const listener = (e) => {
          if (e.data?.type === '__activate_edit_mode') {
            document.getElementById('tweaks-panel').style.display = 'block';
            // Wire up live controls
            const cp = document.getElementById('tw-color');
            const hl = document.getElementById('tw-headline');
            const st = document.getElementById('tw-style');
            if (cp) { cp.value = tw.accentColor; cp.oninput = (ev) => updateTw({ accentColor: ev.target.value }); }
            if (hl) { hl.value = tw.heroHeadline; hl.oninput = (ev) => updateTw({ heroHeadline: ev.target.value }); }
            if (st) { st.value = tw.sectionStyle; st.onchange = (ev) => updateTw({ sectionStyle: ev.target.value }); }
          }
          if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';
        };
        window.addEventListener('message', listener);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', listener);
      }, []);
      function updateTw(patch) {
        setTw(prev => {
          const next = { ...prev, ...patch };
          localStorage.setItem('portfolio-tweaks', JSON.stringify(next));
          window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
          return next;
        });
      }
      return tw;
    }

    /* â”€â”€ Nav â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    function Nav({ accent }) {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const h = () => setScrolled(window.scrollY > 60);
        window.addEventListener('scroll', h);
        return () => window.removeEventListener('scroll', h);
      }, []);
      return (
        <nav style={{
          position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
          padding: '0 clamp(24px,5vw,80px)', height: 68,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          background: scrolled ? 'rgba(8,8,8,0.88)' : 'transparent',
          backdropFilter: scrolled ? 'blur(16px)' : 'none',
          borderBottom: scrolled ? `1px solid ${T.border}` : 'none',
          transition: 'all 0.35s ease',
        }}>
          <div style={{ fontFamily: 'Syne,sans-serif', fontSize: 22, fontWeight: 800, color: '#fff', letterSpacing: '-0.04em' }}>
            CB<span style={{ color: accent }}>.</span>
          </div>
          <div style={{ display: 'flex', gap: 32, alignItems: 'center' }}>
            {[['Work', '#work'], ['About', '#about'], ['Process', '#process']].map(([l, h]) => (
              <a key={l} href={h} style={{
                fontFamily: 'Plus Jakarta Sans,sans-serif', fontSize: 14, fontWeight: 500,
                color: 'rgba(255,255,255,0.55)', transition: 'color 0.2s',
              }}
                onMouseEnter={e => e.target.style.color = '#fff'}
                onMouseLeave={e => e.target.style.color = 'rgba(255,255,255,0.55)'}
              >{l}</a>
            ))}
            <a href="#contact" style={{
              fontFamily: 'Plus Jakarta Sans,sans-serif', fontSize: 14, fontWeight: 700, color: '#fff',
              background: accent, padding: '10px 24px', borderRadius: 8,
              boxShadow: `0 4px 20px ${accent}55`, transition: 'all 0.2s',
            }}
              onMouseEnter={e => { e.target.style.transform = 'translateY(-1px)'; e.target.style.boxShadow = `0 8px 28px ${accent}66`; }}
              onMouseLeave={e => { e.target.style.transform = ''; e.target.style.boxShadow = `0 4px 20px ${accent}55`; }}
            >Let's Talk</a>
          </div>
        </nav>
      );
    }

    /* â”€â”€ Hero â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    function Hero({ accent, headline }) {
      return (
        <section style={{ minHeight: '720px', background: T.dark, position: 'relative', overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          {/* Subtle noise/grid */}
          <div style={{
            position: 'absolute', inset: 0, opacity: 0.025,
            backgroundImage: 'linear-gradient(rgba(255,255,255,1) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,1) 1px,transparent 1px)',
            backgroundSize: '56px 56px', pointerEvents: 'none'
          }} />
          {/* Radial vignette */}
          <div style={{
            position: 'absolute', inset: 0,
            background: 'radial-gradient(ellipse 65% 75% at 50% 55%, transparent 20%, rgba(0,0,0,0.8) 100%)',
            pointerEvents: 'none'
          }} />
          {/* Brand glow bottom center */}
          <div style={{
            position: 'absolute', bottom: '-5%', left: '50%', transform: 'translateX(-50%)',
            width: 500, height: 400,
            background: `radial-gradient(circle, ${accent}22 0%, transparent 70%)`,
            pointerEvents: 'none'
          }} />

          {/* â”€â”€ Cinematic Backlight behind portrait â”€â”€ */}
          {/* Core bright glow - tight, intense */}
          <div style={{
            position: 'absolute', bottom: '18%', left: '50%',
            width: 320, height: 420,
            background: `radial-gradient(ellipse 55% 65% at 50% 60%, ${accent}cc 0%, ${accent}55 30%, transparent 70%)`,
            animation: 'glow-breathe 4s ease-in-out infinite',
            pointerEvents: 'none', zIndex: 1,
            filter: 'blur(2px)',
          }} />
          {/* Wide ambient halo */}
          <div style={{
            position: 'absolute', bottom: '10%', left: '50%',
            width: 700, height: 600,
            background: `radial-gradient(ellipse 60% 55% at 50% 55%, ${accent}33 0%, ${accent}11 45%, transparent 70%)`,
            animation: 'glow-breathe2 5.5s ease-in-out infinite',
            pointerEvents: 'none', zIndex: 1,
            filter: 'blur(8px)',
          }} />
          {/* Abstract background lines (like chart/data lines) inside glow */}
          <div style={{
            position: 'absolute', bottom: '16%', left: '50%', transform: 'translateX(-50%)',
            width: 260, height: 380,
            overflow: 'hidden',
            pointerEvents: 'none', zIndex: 1,
            opacity: 0.18,
          }}>
            <svg width="260" height="380" viewBox="0 0 260 380" style={{ animation: 'lines-drift 8s linear infinite' }}>
              {/* Vertical data lines */}
              {[20, 44, 68, 92, 116, 140, 164, 188, 212, 236].map((x, i) => (
                <line key={x} x1={x} y1="0" x2={x} y2="420" stroke={accent} strokeWidth="0.8" strokeOpacity={i % 3 === 1 ? 0.9 : 0.45} />
              ))}
              {/* Horizontal scan lines */}
              {[40, 80, 120, 160, 200, 240, 280, 320, 360, 400, 440].map((y, i) => (
                <line key={y} x1="0" y1={y} x2="260" y2={y} stroke={accent} strokeWidth="0.5" strokeOpacity={0.3} />
              ))}
              {/* Abstract upward chart line */}
              <polyline points="10,370 40,320 70,280 90,260 120,200 145,170 170,130 195,90 220,60 250,20"
                fill="none" stroke={accent} strokeWidth="1.8" strokeOpacity="0.7" strokeLinecap="round" strokeLinejoin="round" />
              <polyline points="10,390 50,350 80,310 110,270 135,230 160,200 185,160 210,120 240,80"
                fill="none" stroke={accent} strokeWidth="1.2" strokeOpacity="0.4" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </div>
          {/* Rim light - left edge of portrait */}
          <div style={{
            position: 'absolute', bottom: 0, left: '50%',
            transform: 'translateX(calc(-50% - 70px))',
            width: 6, height: '45%',
            background: `linear-gradient(180deg, transparent 0%, ${accent}99 30%, ${accent}cc 60%, transparent 100%)`,
            filter: 'blur(6px)',
            animation: 'rim-pulse 3.5s ease-in-out infinite',
            pointerEvents: 'none', zIndex: 3,
            borderRadius: 4,
          }} />
          {/* Rim light - right edge of portrait */}
          <div style={{
            position: 'absolute', bottom: 0, left: '50%',
            transform: 'translateX(calc(-50% + 70px))',
            width: 6, height: '45%',
            background: `linear-gradient(180deg, transparent 0%, ${accent}99 30%, ${accent}cc 60%, transparent 100%)`,
            filter: 'blur(6px)',
            animation: 'rim-pulse 3.5s ease-in-out infinite 0.5s',
            pointerEvents: 'none', zIndex: 3,
            borderRadius: 4,
          }} />
          {/* Ground light spill */}
          <div style={{
            position: 'absolute', bottom: 0, left: '50%', transform: 'translateX(-50%)',
            width: 400, height: 60,
            background: `radial-gradient(ellipse 70% 100% at 50% 100%, ${accent}44 0%, transparent 70%)`,
            pointerEvents: 'none', zIndex: 1,
            filter: 'blur(4px)',
          }} />

          {/* â‘  Eyebrow */}
          <div style={{ position: 'absolute', top: 90, left: 0, right: 0, textAlign: 'center', zIndex: 3 }}>
            <span style={{
              fontFamily: 'Plus Jakarta Sans,sans-serif', fontSize: 11, fontWeight: 600,
              letterSpacing: '0.22em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.32)',
            }}>Digital Marketer - Funnel Strategist - Landing Page Specialist</span>
          </div>

          {/* â‘¡ MASSIVE headline behind portrait */}
          <div style={{
            position: 'absolute', top: '50%', left: 0, right: 0,
            transform: 'translateY(-52%)',
            fontFamily: 'Syne,sans-serif', fontWeight: 800,
            fontSize: 'clamp(72px,16vw,220px)',
            color: 'rgba(255,255,255,0.90)',
            textAlign: 'center', lineHeight: 0.88,
            letterSpacing: '-0.05em',
            userSelect: 'none', zIndex: 1,
            textWrap: 'nowrap',
          }}>{headline}</div>

          {/* â‘¢ Portrait placeholder */}
          {/*
      <div style={{
        position:'absolute',bottom:0,left:'50%',transform:'translateX(-50%)',
        width:'clamp(180px,18vw,280px)',
        height:'clamp(280px,50vh,480px)',
        zIndex:2,
        background:'linear-gradient(180deg,#3c3840 0%,#1c1820 55%,transparent 100%)',
        borderRadius:'50% 50% 0 0 / 30% 30% 0 0',
        display:'flex',alignItems:'flex-start',justifyContent:'center',
        paddingTop:20,
      }}>
        <span style={{fontFamily:'Plus Jakarta Sans,sans-serif',fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase',color:'rgba(255,255,255,0.18)'}}>your portrait</span>
      </div>
      */}

          <div style={{
            position: 'absolute', bottom: 0, left: '50%', transform: 'translateX(-50%)',
            width: 'clamp(200px, 56vw, 515px)',
            height: 'clamp(280px, 142vh, 783px)',
            zIndex: 2,

          }}>
            <div style={{
              position: 'absolute', top: 144, left: '-50%',
              transform: 'translateX(71%)',
              height: "71%", width: "82%",
              zIndex: -1,
              background: '#E11D48',
              filter: 'blur(199px)',
              borderRadius: '50%',
              cornerBottomRightShape: 'notch',
              opacity: 0.8,
            }}> </div>
            <img src="/assets/hero.png" style={{
              width: '100%',
              height: '100%',
              objectFit: 'cover',
              objectPosition: '0px 115px',
            }} alt="" />
          </div>

          {/* â‘£ Supporting copy + CTA - centered below */}
          <div style={{
            position: 'absolute', bottom: 'clamp(80px,10vh,130px)', left: 0, right: 0,
            textAlign: 'center', zIndex: 3,
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 20,
          }}>
            <p style={{
              fontFamily: 'Plus Jakarta Sans,sans-serif',
              fontSize: 'clamp(14px,1.4vw,17px)', lineHeight: 1.7,
              color: 'rgba(255,255,255,0.55)', maxWidth: 480, margin: 0,
            }}>I build high-converting funnels, landing pages, and Meta Ad campaigns that turn attention into qualified leads and real revenue.</p>
            <a href="#work" style={{
              fontFamily: 'Plus Jakarta Sans,sans-serif', fontSize: 15, fontWeight: 700, color: '#fff',
              background: accent, padding: '15px 40px', borderRadius: 9,
              boxShadow: `0 8px 32px ${accent}55`, letterSpacing: '0.02em',
              transition: 'all 0.25s', display: 'inline-block',
            }}
              onMouseEnter={e => { e.target.style.transform = 'translateY(-2px)'; e.target.style.boxShadow = `0 14px 40px ${accent}66`; }}
              onMouseLeave={e => { e.target.style.transform = ''; e.target.style.boxShadow = `0 8px 32px ${accent}55`; }}
            >View Projects</a>

    /* â”€â”€ LP Preview â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    function LPPreview({
      accent,
      image = '',
      domain = 'yourdomain.com',
      brand = 'Landing Page',
      viewportHeight = 420,
      frameBg = '#fff',
      frameBorder = '1px solid rgba(255,255,255,0.1)',
      frameShadow = '0 12px 48px rgba(0,0,0,0.5)',
      pageBg = '#f3f4f6',
      barBg = '#1a1a1a',
      barInputBg = '#2a2a2a',
      barText = 'rgba(255,255,255,0.3)',
    }) {
      const viewportRef = useRef(null);
      const imageRef = useRef(null);
      const [hovered, setHovered] = useState(false);
      const [imgError, setImgError] = useState(false);
      const [scrollDistance, setScrollDistance] = useState(0);
      const [isTouchDevice, setIsTouchDevice] = useState(false);
      const brandColor = typeof accent === 'string' ? accent : '#E11D48';
      const brandRgb = (() => {
        const fallback = '225, 29, 72';
        if (typeof brandColor !== 'string') return fallback;
        const value = brandColor.trim();
        if (!/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(value)) return fallback;
        let hex = value.slice(1);
        if (hex.length === 3) hex = hex.split('').map(ch => ch + ch).join('');
        const n = parseInt(hex, 16);
        return `${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}`;
      })();

      const hasImage = Boolean(image) && !imgError;

      function calculateScrollDistance() {
        if (!viewportRef.current || !imageRef.current) return;
        const extraHeight = imageRef.current.scrollHeight - viewportRef.current.clientHeight;
        setScrollDistance(Math.max(0, extraHeight));
      }

      useEffect(() => {
        setHovered(false);
        setImgError(false);
      }, [image]);

      useEffect(() => {
        const onResize = () => calculateScrollDistance();
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);

      useEffect(() => {
        if (!window.matchMedia) return;
        const mediaQuery = window.matchMedia('(hover: none), (pointer: coarse)');
        const updateInputMode = () => setIsTouchDevice(mediaQuery.matches);
        updateInputMode();
        if (mediaQuery.addEventListener) {
          mediaQuery.addEventListener('change', updateInputMode);
          return () => mediaQuery.removeEventListener('change', updateInputMode);
        }
        mediaQuery.addListener(updateInputMode);
        return () => mediaQuery.removeListener(updateInputMode);
      }, []);

      const canTapToScroll = hasImage && scrollDistance > 0 && isTouchDevice;
      const scrollHintText = isTouchDevice
        ? (hovered ? 'Tap to reset' : 'Tap to auto-scroll')
        : 'Hover to auto-scroll';

      return (
        <div
          style={{
            position: 'relative',
            width: '100%',
            '--lp-brand': brandColor,
            '--lp-brand-rgb': brandRgb,
          }}
        >
          <div
            onMouseEnter={() => !isTouchDevice && setHovered(true)}
            onMouseLeave={() => !isTouchDevice && setHovered(false)}
            onClick={() => {
              if (canTapToScroll) setHovered(v => !v);
            }}
            style={{
              width: '100%', background: frameBg, borderRadius: 12, overflow: 'hidden',
              border: frameBorder,
              boxShadow: frameShadow,
              cursor: canTapToScroll ? 'pointer' : 'default',
              WebkitTapHighlightColor: 'transparent',
            }}
          >
            <div style={{ background: barBg, padding: '8px 14px', display: 'flex', alignItems: 'center', gap: 6 }}>
              {['#ef4444', '#f59e0b', '#22c55e'].map(c => <div key={c} style={{ width: 9, height: 9, borderRadius: '50%', background: c }} />)}
              <div style={{ flex: 1, background: barInputBg, borderRadius: 4, height: 18, marginLeft: 8, display: 'flex', alignItems: 'center', padding: '0 10px' }}>
                <div style={{ fontFamily: 'JetBrains Mono,monospace', fontSize: 9, color: barText }}>{domain}</div>
              </div>
            </div>

            <div ref={viewportRef} style={{ position: 'relative', height: viewportHeight, overflow: 'hidden', background: pageBg }}>
              {hasImage ? (
                <img
                  ref={imageRef}
                  src={image}
                  onLoad={calculateScrollDistance}
                  onError={() => setImgError(true)}
                  alt={`${brand} landing page screenshot`}
                  style={{
                    width: '100%',
                    display: 'block',
                    transform: `translateY(${hovered ? -scrollDistance : 0}px)`,
                    transition: hovered ? 'transform 8s linear' : 'transform 0.6s ease-out',
                  }}
                />
              ) : (
                <div>
                  <div style={{ height: 90, background: `linear-gradient(135deg,#1a0a05,#3d1a00)`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 6 }}>
                    <div style={{ fontFamily: 'Syne,sans-serif', fontSize: 16, fontWeight: 800, color: '#fff', letterSpacing: '-0.02em' }}>{brand}</div>
                    <div style={{ width: 60, height: 2, background: accent, borderRadius: 1 }} />
                  </div>
                  <div style={{ padding: '14px 16px', background: '#fafafa' }}>
                    {[70, 90, 55, 65, 100].map((w, i) => (
                      <div key={i} style={{ height: 22, background: i === 3 ? accent + '33' : '#e4e4e7', borderRadius: 4, marginBottom: 8, width: `${w}%` }} />
                    ))}
                    <div style={{ height: 32, background: accent, borderRadius: 6, marginTop: 10 }} />
                  </div>
                </div>
              )}
            </div>
          </div>

          {hasImage && scrollDistance > 0 && (
            <>
              <div className="lp-scroll-callout">
                <span className="lp-scroll-callout-dot">↓</span>
                <span className="lp-scroll-callout-label">{scrollHintText}</span>
              </div>
              <svg className="lp-scroll-callout-arrow" viewBox="0 0 64 64" fill="none" aria-hidden="true">
                <path d="M56 8C60 31 47 48 20 56" stroke="currentColor" strokeWidth="4.6" strokeLinecap="round" />
                <path d="M30 46L20 56L34 60" stroke="currentColor" strokeWidth="4.6" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </>
          )}
        </div>
      );
    }
